<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RE Toolkit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#101014;
--sf:#18181f;
--well:#0b0b0f;
--bd:#26262e;
--bd2:#3a3a46;
--tx:#9ca0b0;
--txb:#d4d7e5;
--dim:#4a4e5e;
--acc:#c8a84b;
--red:#c4564a;
--grn:#5f8a5e;
--mono:'JetBrains Mono',ui-monospace,'Cascadia Mono',Consolas,monospace;
}
html,body{height:100%}
body{
width:440px;height:560px;
display:flex;flex-direction:column;
font-family:var(--mono);
font-variant-ligatures:none;
background:var(--bg);
color:var(--tx);
overflow:hidden;
}
.hd{
display:flex;align-items:baseline;gap:8px;
padding:10px 12px 8px;
border-bottom:1px solid var(--bd);
}
.brand{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--txb)}
.ver{font-size:9px;color:var(--dim);letter-spacing:.05em}
.tabs{
display:flex;
border-bottom:1px solid var(--bd);
background:var(--sf);
}
.t{
flex:1;appearance:none;background:none;border:0;
border-bottom:2px solid transparent;
font-family:var(--mono);font-size:9px;font-weight:500;
letter-spacing:.1em;text-transform:uppercase;
color:var(--dim);padding:8px 0 7px;
cursor:pointer;transition:color .12s;
}
.t:hover{color:var(--tx)}
.t.on{color:var(--txb);border-bottom-color:var(--acc)}
main{
flex:1;min-height:0;
display:flex;flex-direction:column;
padding:8px;gap:6px;
}
.tb.h{display:none}
.bar{display:flex;gap:4px;align-items:center}
.sep{width:1px;height:16px;background:var(--bd);margin:0 4px}
.btn{
appearance:none;
font-family:var(--mono);font-size:9px;font-weight:500;
letter-spacing:.12em;text-transform:uppercase;
color:var(--tx);background:var(--sf);
border:1px solid var(--bd);border-radius:2px;
padding:5px 10px;cursor:pointer;
transition:border-color .12s,color .12s,background .12s;
}
.btn:hover{border-color:var(--bd2);color:var(--txb);background:#1f1f28}
.btn:active{background:#141419}
.btn.acc{color:var(--acc);border-color:#3d3420}
.btn.acc:hover{background:#1f1c14;border-color:var(--acc)}
.btn.rec{color:var(--red);border-color:#3a2220}
.btn.rec::before{content:'●';margin-right:5px;font-size:6px;vertical-align:1px}
.btn.rec:hover{background:#1f1414;border-color:var(--red)}
.btn.rec.on{color:#e8a09a;background:#2a1a18;border-color:var(--red)}
.btn.rec.on::before{content:'■';font-size:7px}
#ta{
flex:1;min-height:0;resize:none;
font-family:var(--mono);font-variant-ligatures:none;
font-size:11px;line-height:1.6;
color:#b0b4c4;background:var(--well);
border:1px solid var(--bd);border-radius:2px;
padding:8px 10px;outline:none;
caret-color:var(--acc);
transition:border-color .12s;
scrollbar-width:thin;scrollbar-color:var(--bd) transparent;
}
#ta:focus{border-color:var(--bd2)}
#ta::placeholder{color:var(--dim)}
#ta::selection{background:rgba(200,168,75,.15)}
#ta::-webkit-scrollbar{width:6px}
#ta::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.sb{
display:flex;align-items:center;justify-content:space-between;
padding:6px 12px;
border-top:1px solid var(--bd);
background:var(--sf);
font-size:9px;letter-spacing:.06em;
color:var(--dim);
}
.sl{display:flex;align-items:center;gap:6px;text-transform:uppercase}
.sr{color:var(--dim)}
.dot{
width:6px;height:6px;border-radius:1px;
background:var(--dim);
transition:background .12s;
}
.dot.on{background:var(--grn)}
.dot.rec{background:var(--red);animation:blink 1s steps(1) infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
</style>
</head>
<body>
<header class="hd"><span class="brand">RE·TOOLKIT</span><span class="ver">4.0.0</span></header>
<nav class="tabs">
<button class="t on" data-p="rec">rec</button>
<button class="t" data-p="api">api</button>
<button class="t" data-p="pw">pw</button>
<button class="t" data-p="har">har</button>
<button class="t" data-p="dec">dec</button>
<button class="t" data-p="map">map</button>
</nav>
<main>
<section class="tb" data-p="rec">
<div class="bar">
<button id="recBtn" class="btn rec">rec</button>
<button id="recClr" class="btn">clear</button>
<span class="sep"></span>
<button id="recExp" class="btn acc">export</button>
</div>
</section>
<section class="tb h" data-p="api">
<div class="bar">
<button id="apiCap" class="btn acc">capture</button>
<button id="apiCurl" class="btn">curl</button>
<button id="apiClr" class="btn">clear</button>
<span class="sep"></span>
<button id="apiCpy" class="btn">copy</button>
</div>
</section>
<section class="tb h" data-p="pw">
<div class="bar">
<button id="pwGen" class="btn acc">generate</button>
<button id="pwClr" class="btn">clear</button>
<span class="sep"></span>
<button id="pwCpy" class="btn">copy</button>
</div>
</section>
<section class="tb h" data-p="har">
<div class="bar">
<button id="harExp" class="btn acc">export</button>
<button id="harClr" class="btn">clear</button>
<span class="sep"></span>
<button id="harCpy" class="btn">copy</button>
</div>
</section>
<section class="tb h" data-p="dec">
<div class="bar">
<button id="decRun" class="btn acc">decode</button>
<button id="decClr" class="btn">clear</button>
<span class="sep"></span>
<button id="decCpy" class="btn">copy</button>
</div>
</section>
<section class="tb h" data-p="map">
<div class="bar">
<button id="mapBuild" class="btn acc">build</button>
<button id="mapClr" class="btn">clear</button>
<span class="sep"></span>
<button id="mapCpy" class="btn">copy</button>
</div>
</section>
<textarea id="ta" spellcheck="false"></textarea>
</main>
<footer class="sb">
<span class="sl"><span id="dot" class="dot"></span><span id="status">idle</span></span>
<span id="info" class="sr"></span>
</footer>
<script src="popup.js"></script>
</body>
</html>
